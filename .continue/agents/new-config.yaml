# This is an example configuration file
# To learn more, see the full config.yaml reference: https://docs.continue.dev/reference

name: subagents_role_setting
version: 1.0.0
schema: v1

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - title: "Claude 4.6 Opus (수석 아키텍트 / 설계 및 지시)"
    provider: "anthropic"
    model: "claude-4-6-opus-latest"
    apiKey: "sk-ant-당신의_클로드_API키를_여기에_입력"

  - title: "Claude 4.6 Sonnet (코딩 메인 / 파이프라인&UI 개발)"
    provider: "anthropic"
    model: "claude-4-6-sonnet-latest"
    apiKey: "sk-ant-당신의_클로드_API키를_여기에_입력"

  - title: "Gemini 3.1 Pro (QA 및 검증 / 스키마 크로스체크)"
    provider: "gemini"
    model: "gemini-3-1-pro-latest"
    apiKey: "${GEMINI_KEY}"

  - title: "Claude 4.6 Haiku (에러 분석 및 테스트 / 단순 조수)"
    provider: "anthropic"
    model: "claude-4-6-haiku-latest"
    apiKey: "sk-ant-당신의_클로드_API키를_여기에_입력"
# MCP Servers that Continue can access
# https://docs.continue.dev/customization/mcp-tools
mcpServers:
  - uses: anthropic/memory-mcp
